    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Gallery</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-color: #00e5ff;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }

        /* 顶部导航 */
        header {
            background-color: rgba(21, 29, 48, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        /* 主体网格布局 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }
            header h1 { font-size: 1.5rem; }
        }

        /* 卡片样式 */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 2 / 3;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* 骨架屏动画 */
        .skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #151d30 25%, #1e2942 50%, #151d30 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 错误图片占位 */
        .error-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 底部固定控制栏 */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
        }

        .btn {
            background-color: #1e2942;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.95rem;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background-color: #111827;
        }

        .btn:not(:disabled):active {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        /* 全屏预览层 */
        .lightbox {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Anime Gallery</h1>
    </header>

    <div class="container">
        <div class="grid" id="imageGrid">
            </div>
    </div>

    <div class="controls">
        <button class="btn" id="btnPrev" disabled="">PREV</button>
        <div class="page-info" id="pageInfo">第 1 页</div>
        <button class="btn" id="btnNext">NEXT</button>
    </div>

    <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightboxImg" src="" alt="Preview">
    </div>

    <script>
        const LIMIT = 20;
        let offset = 0;
        let currentPage = 1;

        const grid = document.getElementById('imageGrid');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const pageInfo = document.getElementById('pageInfo');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
function getApiUrl() {
    const targetUrl = `https://api.nekosapi.com/v4/images?limit=${LIMIT}&offset=${offset}&rating=explicit`;
    
    // 官方 cors-anywhere 的标准拼接语法（直接加在目标 URL 前面）
    return `https://cors-anywhere.herokuapp.com/${targetUrl}`;
}
        async function loadImages() {
            // 展现骨架图
            grid.innerHTML = Array(LIMIT).fill(0).map(() => `
                <div class="card">
                    <div class="skeleton"></div>
                </div>
            `).join('');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                const response = await fetch(getApiUrl());
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                const items = data.items || [];

                if (items.length === 0) {
                    grid.innerHTML = `<div class="status-msg">暂无更多图片 ＞﹏＜</div>`;
                    btnNext.disabled = true;
                    return;
                }

                grid.innerHTML = '';
                items.forEach(item => {
                    const imgSrc = item.url || item.url;
                    const originalSrc = item.url;

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const skeleton = document.createElement('div');
                    skeleton.className = 'skeleton';
                    card.appendChild(skeleton);

                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.alt = `Image ${item.id}`;
                    
                    card.addEventListener('click', () => {
                        lightboxImg.src = originalSrc;
                        lightbox.classList.add('active');
                    });

                    img.onload = () => {
                        skeleton.remove();
                        img.style.opacity = '1';
                    };

                    img.onerror = () => {
                        skeleton.remove();
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-placeholder';
                        errorDiv.innerHTML = `⚠️<br><span style="margin-top:5px;font-size:11px;">图片加载失败<br>ID: ${item.id}</span>`;
                        card.appendChild(errorDiv);
                    };

                    card.appendChild(img);
                    grid.appendChild(card);
                });

                // 判断下一页是否有数据
                btnNext.disabled = false;

            } catch (error) {
                console.error(error);
                grid.innerHTML = `<div class="status-msg" style="color: #ef4444;">数据请求失败，请稍后再试。<a href="http://cors-anywhere.herokuapp.com/corsdemo">cors</a></div>`;
            }

            btnPrev.disabled = (offset === 0);
            pageInfo.textContent = `第 ${currentPage} 页`;
        }

        btnPrev.addEventListener('click', () => {
            if (offset >= LIMIT) {
                offset -= LIMIT;
                currentPage--;
                loadImages();
            }
        });

        btnNext.addEventListener('click', () => {
            offset += LIMIT;
            currentPage++;
            loadImages();
        });

        // 初始化加载
        loadImages();
    </script>
